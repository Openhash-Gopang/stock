<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>K-Stock AI 전문가</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap">
<script src="/gopang-wallet.js"></script>
<script src="/pdv-history-client.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/report.js"></script>
<script type="module" src="https://hondi.net/auth/subsystem-auth.js"></script>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  font-size:15px;background:#fff;color:#111;-webkit-font-smoothing:antialiased}
:root{
  --green:#16a34a;--green-lt:#dcfce7;--green-dk:#15803d;--green-bd:#86efac;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f9fafb;--chip-border:#e5e7eb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── 앱 레이아웃 ── */
.app{display:flex;flex-direction:column;height:100%;height:100dvh;
  max-width:480px;margin:0 auto;background:#fff;overflow:hidden}

/* ── 상단 바 ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t)+12px) 16px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:#fff;
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-icon{width:28px;height:28px;background:var(--green);border-radius:7px;
  display:flex;align-items:center;justify-content:center}
.topbar-icon svg{width:14px;height:14px;stroke:#fff;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.topbar-name{font-size:15px;font-weight:800;color:#111;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.auth-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--chip-bg);color:var(--txt2);border:1px solid var(--chip-border);display:none}
.top-btn{
  display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;
  font-size:12px;font-weight:600;color:var(--txt2);background:none;border:none;
  cursor:pointer;transition:background .12s,color .12s;
}
.top-btn:hover,.top-btn:active{background:var(--chip-bg);color:#111}
.top-btn svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.top-btn.icon-only{padding:6px;border-radius:8px}
.top-btn.icon-only svg{width:18px;height:18px}

/* ── 설정 패널 ── */
.settings-panel{
  position:fixed;inset:0;z-index:999;display:flex;justify-content:flex-end;
  visibility:hidden;
}
.settings-panel.open{visibility:visible}
.settings-overlay{
  flex:1;background:rgba(0,0,0,.3);
  opacity:0;transition:opacity .25s;cursor:pointer;
}
.settings-panel.open .settings-overlay{opacity:1}
.settings-drawer{
  width:80%;max-width:300px;background:#fff;height:100%;
  display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .25s;
  box-shadow:-4px 0 24px rgba(0,0,0,.12);
}
.settings-panel.open .settings-drawer{transform:translateX(0)}
.settings-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t)+14px) 16px 14px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.settings-head-title{font-size:15px;font-weight:800;color:#111}
.settings-close{background:none;border:none;cursor:pointer;padding:4px;
  display:flex;align-items:center;justify-content:center;border-radius:6px}
.settings-close:hover{background:var(--chip-bg)}
.settings-close svg{width:18px;height:18px;stroke:#6b7280;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.settings-body{flex:1;overflow-y:auto;padding:12px 0}
.settings-section{padding:8px 16px 4px}
.settings-section-title{font-size:11px;font-weight:700;color:var(--txt3);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.settings-item{
  display:flex;align-items:center;gap:12px;padding:11px 16px;
  cursor:pointer;transition:background .12s;border-radius:0;
}
.settings-item:hover{background:var(--chip-bg)}
.settings-item svg{width:18px;height:18px;stroke:#374151;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.settings-item-label{font-size:14px;font-weight:500;color:#111}
.settings-item-sub{font-size:12px;color:var(--txt2);margin-top:1px}
.settings-sep{height:1px;background:var(--border);margin:4px 16px}

/* ── 채팅 화면 ── */
.chat-screen{display:flex;flex-direction:column;flex:1;overflow:hidden}

/* ── 채팅 바디 ── */
.chat-body{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 12px;display:flex;flex-direction:column;gap:10px;background:#fff;
}

/* 인트로 */
.intro-section{
  display:flex;flex-direction:column;align-items:center;
  padding:40px 0 28px;gap:16px;
}
.intro-icon{
  width:68px;height:68px;border-radius:20px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 28px rgba(22,163,74,.28);
}
.intro-icon svg{width:32px;height:32px;stroke:#fff;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.intro-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;text-align:center}
.intro-sub{font-size:14px;color:var(--txt2);line-height:1.65;text-align:center}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 8px}
.chip{
  display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;
  background:#fff;border:1.5px solid var(--chip-border);
  font-size:13px;font-weight:600;color:#374151;cursor:pointer;
  transition:border-color .12s,background .12s,color .12s;white-space:nowrap;
}
.chip svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.chip:hover,.chip:active{background:var(--green-lt);border-color:var(--green);color:var(--green-dk)}

/* 버블 */
.b-ai{
  max-width:88%;align-self:flex-start;
  background:#f9fafb;border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;
  padding:10px 14px;font-size:14px;line-height:1.75;color:#111;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
}
.b-ai b{font-weight:700}
.b-ai code{background:#f1f5f9;padding:1px 5px;border-radius:4px;font-size:13px}
.b-user{
  max-width:88%;align-self:flex-end;
  background:var(--green);color:#fff;
  border-radius:16px 16px 4px 16px;
  padding:10px 14px;font-size:14px;line-height:1.75;
}
.b-time{font-size:10px;color:var(--txt3);margin-top:3px;padding:0 2px}
.b-ai-wrap{display:flex;flex-direction:column;align-self:flex-start;max-width:88%}
.b-user-wrap{display:flex;flex-direction:column;align-items:flex-end;max-width:88%;align-self:flex-end}

/* ── 입력 영역 ── */
.chat-input-area{
  background:#fff;border-top:1px solid var(--border);
  padding:10px 12px calc(10px + var(--safe-b));
  display:flex;align-items:flex-end;flex-shrink:0;gap:6px;
}
.input-wrap{
  flex:1;display:flex;align-items:flex-end;background:#f3f4f6;
  border:1.5px solid transparent;border-radius:22px;
  padding:8px 10px 8px 14px;
  transition:border-color .15s,background .15s;min-width:0;
}
.input-wrap:focus-within{border-color:var(--green);background:#fff}
.chat-textarea{
  flex:1;background:transparent;border:none;
  font-family:'Pretendard',sans-serif;font-size:14px;
  resize:none;outline:none;max-height:120px;line-height:1.5;
  color:#111;padding:2px 0;min-width:0;
}
.chat-textarea::placeholder{color:var(--txt3)}

/* 입력 필드 옆 전송 버튼 (항상 표시) */
.chat-send-btn{
  width:34px;height:34px;border-radius:50%;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;border:none;cursor:pointer;transition:background .12s;align-self:flex-end;
}
.chat-send-btn:disabled{background:var(--green-bd);cursor:not-allowed}
.chat-send-btn svg{width:14px;height:14px;stroke:#fff;stroke-width:2.2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}

/* 보조 버튼 그룹 — 기본 표시, 입력 중 숨김 */
.aux-btns{
  display:flex;align-items:center;gap:2px;flex-shrink:0;align-self:flex-end;
  transition:opacity .15s,width .15s;overflow:hidden;
}
.aux-btns.hidden{opacity:0;width:0;pointer-events:none}
.aux-btn{
  width:40px;height:40px;border-radius:50%;background:none;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .12s;flex-shrink:0;
}
.aux-btn:hover,.aux-btn:active{background:var(--chip-bg)}
.aux-btn svg{width:22px;height:22px;stroke:#6b7280;stroke-width:1.8;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.aux-btn.mic-btn svg{stroke:var(--green);width:24px;height:24px;stroke-width:2}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:calc(80px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;
  z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 대화 기록 모달 ── */
.history-modal{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.45);
  display:flex;align-items:flex-end;justify-content:center;
  visibility:hidden;opacity:0;transition:opacity .2s,visibility .2s;
}
.history-modal.open{visibility:visible;opacity:1}
.history-sheet{
  width:100%;max-width:480px;background:#fff;
  border-radius:20px 20px 0 0;
  max-height:75dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .25s;
}
.history-modal.open .history-sheet{transform:translateY(0)}
.history-sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.history-sheet-title{font-size:15px;font-weight:800;color:#111}
.history-sheet-close{background:none;border:none;cursor:pointer;padding:4px;
  border-radius:6px;display:flex;align-items:center;justify-content:center}
.history-sheet-close:hover{background:var(--chip-bg)}
.history-sheet-close svg{width:18px;height:18px;stroke:#6b7280;stroke-width:2;fill:none;
  stroke-linecap:round;stroke-linejoin:round}
.history-body{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.history-empty{text-align:center;color:var(--txt3);font-size:14px;padding:32px 0}
.history-item{border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.6}
.history-item.user{background:var(--green-lt);color:var(--green-dk);align-self:flex-end;max-width:88%;text-align:right}
.history-item.ai{background:var(--chip-bg);color:#374151;align-self:flex-start;max-width:88%}
.history-item-role{font-size:10px;font-weight:700;margin-bottom:3px;opacity:.7}


</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
      <span class="topbar-name">K-Stock</span>
    </div>
    <div class="topbar-right">
      <span class="auth-badge" id="auth-badge">L0</span>
      
      <button class="top-btn icon-only" onclick="openSettings()" title="설정">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </div>
  <div class="chat-screen">
    <div class="chat-body" id="mob-chat-body">
      <div class="intro-section" id="intro-section">
        <div class="intro-icon"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
        <div>
          <div class="intro-title">K-Stock AI 전문가</div>
          <div class="intro-sub" style="margin-top:6px">주식 · ETF · 채권 · 투자 분석<br>GDC 기반 포트폴리오를 최적화합니다.</div>
        </div>
        <div class="chip-row">
          <button class="chip" onclick="qs('오늘 시장 브리핑 해주세요')">
            <svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>시장 브리핑
          </button>
          <button class="chip" onclick="qs('내 포트폴리오를 분석해 줘')">
            <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>포트폴리오 분석
          </button>
          <button class="chip" onclick="qs('지금 살 만한 종목 추천해 줘')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>종목 추천
          </button>
          <button class="chip" onclick="qs('내 투자 리스크를 분석해 줘')">
            <svg viewBox="0 0 24 24"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>리스크 분석
          </button>
          <button class="chip" onclick="qs('GDC를 원화로 환전하려면?')">
            <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>GDC 환전
          </button>
          <button class="chip" onclick="qs('초보자에게 맞는 ETF 추천해 줘')">
            <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 2 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>ETF 추천
          </button>
        </div>
      </div>
    </div>
    <div class="chat-input-area">
      <div class="aux-btns" id="aux-btns">
        <button class="aux-btn mic-btn" id="mob-mic-btn" onclick="toggleMic()" title="음성 입력">
          <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
        </button>
        <button class="aux-btn" onclick="document.getElementById('file-input').click()" title="파일 첨부">
          <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <button class="aux-btn" onclick="openCamera()" title="카메라">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>
      <div class="input-wrap">
        <textarea class="chat-textarea" id="mob-input" rows="1"
          placeholder="주식·ETF·투자에 대해 물어보세요…"
          oninput="onInputChange(this)"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();mobSend()}"></textarea>
      </div>
      <button class="chat-send-btn" id="mob-send-btn" onclick="mobSend()" disabled>
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
      <input type="file" id="file-input" style="display:none" onchange="handleFile(this)">
    </div>
  </div>
</div>

<div class="settings-panel" id="settings-panel">
  <div class="settings-overlay" onclick="closeSettings()"></div>
  <div class="settings-drawer">
    <div class="settings-head">
      <span class="settings-head-title">설정</span>
      <button class="settings-close" onclick="closeSettings()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="settings-section">
        <div class="settings-section-title">계정</div>
        <div class="settings-item">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <div><div class="settings-item-label" id="settings-user-name">인증 대기 중</div>
          <div class="settings-item-sub" id="settings-user-level">—</div></div>
        </div>
      </div>
      
      <div class="settings-sep"></div>
      <div class="settings-section">
        <div class="settings-section-title">투자</div>
        <div class="settings-item" onclick="qs('내 포트폴리오 현황 알려줘');closeSettings()">
          <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <div><div class="settings-item-label">포트폴리오 현황</div><div class="settings-item-sub">보유 종목 및 수익률</div></div>
        </div>
        <div class="settings-item" onclick="finishAndReturn();closeSettings()">
          <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          <div><div class="settings-item-label">상담 종료 및 PDV 기록</div><div class="settings-item-sub">기록 저장 후 고팡으로 복귀</div></div>
        </div>
      </div>
      
      <div class="settings-sep"></div>
      <div class="settings-section">
        <div class="settings-section-title">대화</div>
        <div class="settings-item" onclick="showHistory()">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <div><div class="settings-item-label">대화 기록</div><div class="settings-item-sub">현재 세션의 대화 내역</div></div>
        </div>
        <div class="settings-item" onclick="clearChat();closeSettings()">
          <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.36"/></svg>
          <div><div class="settings-item-label">대화 초기화</div><div class="settings-item-sub">현재 채팅 기록 삭제</div></div>
        </div>
      </div>
      <div class="settings-sep"></div>
      <div class="settings-section">
        <div class="settings-section-title">기타</div>
        <div class="settings-item" onclick="window.open('desktop.html','_blank')">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          <div><div class="settings-item-label">PC 화면 보기</div><div class="settings-item-sub">데스크탑 전체 기능 화면 열기</div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="history-modal" id="history-modal" onclick="if(event.target===this)closeHistory()">
  <div class="history-sheet">
    <div class="history-sheet-head">
      <span class="history-sheet-title">대화 기록</span>
      <button class="history-sheet-close" onclick="closeHistory()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="history-body" id="history-body"></div>
  </div>
</div>
<div class="toast" id="mob-toast"></div>
<script>

let _user = null;
let _sessionStart = new Date();
let _sessionMsgCnt = 0;
let _isGwp = false;


const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';
// 2026-07-04 수정(긴급): 기존 URL이 존재하지 않는 'SP-KSTOCK-v1_0.txt'를 가리켜
// fetch가 항상 404 → 아래 한 줄짜리 SP_FALLBACK으로만 서비스되고 있었다.
// 실제 저장소에 있는 진짜 K-Stock 시스템 프롬프트는 prompts/system_prompt.txt.
const SP_URL = 'https://raw.githubusercontent.com/Openhash-Gopang/stock/main/prompts/system_prompt.txt';
const SP_FALLBACK = `K-Stock AI 전문가. 주식·ETF·채권·투자 분석 전문. GDC 기반 투자 포트폴리오 최적화, 실시간 시장 브리핑, 리스크 분석 제공.`;
const CFG = { systemPrompt: null };

async function loadSystemPrompt() {
  if (CFG.systemPrompt) return CFG.systemPrompt;
  let universalIntegrity = '';
  try {
    const u = await fetch('https://raw.githubusercontent.com/Openhash-Gopang/gopang/main/prompts/UNIVERSAL-INTEGRITY_v1_0.md');
    if (u.ok) universalIntegrity = await u.text();
  } catch (e) { console.warn('[SP] UNIVERSAL-INTEGRITY 로드 실패:', e.message); }
  try {
    const r = await fetch(SP_URL + '?t=' + Date.now());
    if (r.ok) {
      const own = await r.text();
      CFG.systemPrompt = universalIntegrity ? `${universalIntegrity}\n\n---\n\n${own}` : own;
      return CFG.systemPrompt;
    }
  } catch(e) { console.warn('[SP]', e.message); }
  CFG.systemPrompt = universalIntegrity ? `${universalIntegrity}\n\n---\n\n${SP_FALLBACK}` : SP_FALLBACK;
  return CFG.systemPrompt;
}

async function callAIRaw(messages) {
  const sp = await loadSystemPrompt();
  try {
    const r = await fetch(`${PROXY}/ai/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ provider:'deepseek', model:'deepseek-chat', system:sp, messages:messages.slice(-10), max_tokens:2000 }),
    });
    if (!r.ok) throw new Error(`proxy ${r.status}`);
    const d = await r.json(); return d.content || '잠시 후 다시 시도해 주세요.';
  } catch(e) {
    console.warn('[K-Stock] DeepSeek → Claude:', e.message);
    const r2 = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:await loadSystemPrompt(), messages:messages.slice(-8) }),
    });
    const d2 = await r2.json();
    return d2.content?.find(c=>c.type==='text')?.text || '오류가 발생했습니다.';
  }
}

// 2026-07-04: PDV_HISTORY_REQUEST 가로채기 계층 (K-Tax/K-School과 동일 패턴).
async function callAI(messages) {
  const raw = await callAIRaw(messages);
  if (!window.PdvHistoryClient || !/\[PDV(?:_HISTORY)?_REQUEST:/.test(raw)) return raw;

  const { interceptPdvTags } = window.PdvHistoryClient;
  const r = await interceptPdvTags(raw, {
    svc: 'kstock', ipv6: (typeof _user !== 'undefined' && _user?.ipv6) ? _user.ipv6 : 'anonymous',
    resumeContext: { messages },
  });
  if (!r) return raw;
  if (r.redirecting) return raw;

  const summaryText = (r.results || []).map(x => {
    if (x.error) return `(${x.scope} 이력 조회 실패: ${x.error})`;
    if (!x.summary || x.summary.available === false) return `(${x.scope} 이전 기록 없음)`;
    return `(${x.scope} 이전 기록: ${JSON.stringify(x.summary)})`;
  }).join('\n');

  const cleaned = raw.replace(/\[PDV(?:_HISTORY)?_REQUEST:[^\]]+\]/g, '').trim();
  const followUp = [
    ...messages,
    { role: 'assistant', content: cleaned || '(이전 기록을 조회하겠습니다)' },
    { role: 'user', content: `[시스템: PDV 조회 결과]\n${summaryText}\n\n위 조회 결과를 반영해서 답변을 이어가 주세요.` },
  ];
  return callAIRaw(followUp);
}

function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function updateSendBtn() {
  const btn=document.getElementById('mob-send-btn');
  if(btn) btn.disabled=!document.getElementById('mob-input').value.trim();
}
function onInputChange(el) {
  autoResize(el); updateSendBtn();
  const typing=el.value.length>0;
  document.getElementById('aux-btns')?.classList.toggle('hidden',typing);
  const intro=document.getElementById('intro-section');
  if(intro) intro.style.display=typing?'none':'flex';
}
function timeStr() { return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function markdownLite(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>');
}
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hideIntro() { const el=document.getElementById('intro-section'); if(el) el.style.display='none'; }
function toast(msg) {
  const t=document.getElementById('mob-toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

let hist=[], mc=0;

function appendMsg(role,text) {
  const id='mb'+(mc++), body=document.getElementById('mob-chat-body');
  const wrap=document.createElement('div'); wrap.id=id;
  if(role==='user') {
    wrap.className='b-user-wrap';
    wrap.innerHTML=`<div class="b-user">${text.replace(/\n/g,'<br>')}</div><div class="b-time">${timeStr()}</div>`;
  } else {
    wrap.className='b-ai-wrap';
    wrap.innerHTML=`<div class="b-ai">${markdownLite(text)}</div><div class="b-time">${timeStr()}</div>`;
  }
  body.appendChild(wrap); body.scrollTop=body.scrollHeight; return id;
}

async function mobSend() {
  const inp=document.getElementById('mob-input');
  const msg=inp.value.trim(); if(!msg) return;
  inp.value=''; autoResize(inp); updateSendBtn();
  document.getElementById('aux-btns')?.classList.remove('hidden');
  hideIntro();
  appendMsg('user',msg); hist.push({role:'user',content:msg});
  const btn=document.getElementById('mob-send-btn'); btn.disabled=true;
  const tid=appendMsg('ai','…');
  try {
    const txt=await callAI(hist);
    document.getElementById(tid)?.remove(); appendMsg('ai',txt);
    hist.push({role:'assistant',content:txt}); _recordPdv(msg);
  } catch { document.getElementById(tid)?.remove(); appendMsg('ai','오류가 발생했습니다.'); }
  btn.disabled=false;
}

// 2026-07-04: consent.html에서 돌아온 직후인지 확인 — PDV_HISTORY_REQUEST 파일럿.
document.addEventListener('DOMContentLoaded', async () => {
  if (!window.PdvHistoryClient) return;
  const back = window.PdvHistoryClient.checkPdvConsentReturn();
  if (!back) return;
  if (back.denied) {
    appendMsg('ai', '이전 기록 조회에 동의하지 않으셨네요. 처음부터 다시 도와드릴게요.');
    return;
  }
  if (back.granted && back.resumeContext?.messages) {
    appendMsg('ai', '동의 확인했습니다. 이전 기록을 반영해서 이어가겠습니다...');
    hist = back.resumeContext.messages;
    try {
      const resumed = await callAI(hist);
      appendMsg('ai', resumed);
      hist.push({role:'assistant',content:resumed});
    } catch (e) {
      appendMsg('ai', `이어서 진행하는 중 오류가 발생했습니다: ${e.message}`);
    }
  }
});

function qs(s) {
  const inp=document.getElementById('mob-input');
  inp.value=s; autoResize(inp); updateSendBtn();
  document.getElementById('aux-btns')?.classList.remove('hidden');
  hideIntro(); mobSend();
}

function clearChat() {
  hist=[];
  document.getElementById('mob-chat-body').innerHTML='';
  const intro=document.getElementById('intro-section');
  if(intro) intro.style.display='flex'; else { location.reload(); return; }
  const inp=document.getElementById('mob-input');
  if(inp) { inp.value=''; autoResize(inp); updateSendBtn(); }
  document.getElementById('aux-btns')?.classList.remove('hidden');
}

function _recordPdv(userMsg) {
  try {
    const token=JSON.parse(sessionStorage.getItem('gopang_sso_token')||'{}');
    const user_guid=token.ipv6||'anonymous';
    fetch(`${PROXY}/pdv_log`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_guid,source:'kstock',report:{pdv_6w:{
        who:user_guid,when:new Date().toISOString(),where:'https://stock.hondi.net/webapp.html',
        what:'K-Stock AI 투자 상담',how:`질문: ${(userMsg||'').slice(0,60)}`,why:'투자 포트폴리오 분석 및 시장 브리핑'
      }}})
    }).catch(()=>{});
  } catch(e) { console.warn('[PDV]',e.message); }
}

(function initCtx() {
  const params=new URLSearchParams(location.search);
  const ctxRaw=params.get('ctx')||'', ctxEnc=params.get('ctx_enc');
  const ctx=ctxRaw?(ctxEnc==='b64'?decodeURIComponent(escape(atob(ctxRaw))):decodeURIComponent(ctxRaw)):null;
  if(ctx) setTimeout(()=>qs(ctx),300);
})();

function openSettings() { document.getElementById('settings-panel').classList.add('open'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }

function showHistory() {
  closeSettings();
  const body=document.getElementById('history-body'); body.innerHTML='';
  if(!hist.length) { body.innerHTML='<div class="history-empty">대화 기록이 없습니다.</div>'; }
  else {
    hist.forEach(m=>{
      const el=document.createElement('div');
      el.className=`history-item ${m.role==='user'?'user':'ai'}`;
      el.innerHTML=`<div class="history-item-role">${m.role==='user'?'나':'AI'}</div>${escHtml(m.content).replace(/\n/g,'<br>')}`;
      body.appendChild(el);
    });
    setTimeout(()=>{body.scrollTop=body.scrollHeight;},50);
  }
  document.getElementById('history-modal').classList.add('open');
}
function closeHistory() { document.getElementById('history-modal').classList.remove('open'); }

function handleFile(input) {
  const file=input.files[0]; if(!file) return;
  const name=file.name; input.value=''; hideIntro();
  appendMsg('user',`📎 ${name}`); hist.push({role:'user',content:`[첨부 파일: ${name}]`});
  setTimeout(async()=>{
    const btn=document.getElementById('mob-send-btn'); btn.disabled=true;
    const tid=appendMsg('ai','…');
    const txt=await callAI(hist).catch(()=>'파일 처리 중 오류가 발생했습니다.');
    document.getElementById(tid)?.remove(); appendMsg('ai',txt);
    hist.push({role:'assistant',content:txt}); btn.disabled=false;
  },200);
}
function openCamera() {
  const i=document.createElement('input'); i.type='file'; i.accept='image/*'; i.capture='environment';
  i.onchange=()=>handleFile(i); i.click();
}

let micActive=false,recognition=null,mediaRecorder=null,audioChunks=[];
function _micSetUI(active) {
  micActive=active;
  const btn=document.getElementById('mob-mic-btn'); if(!btn) return;
  if(active) { btn.style.background='#fee2e2'; btn.querySelector('svg').style.stroke='#ef4444'; }
  else { btn.style.background=''; btn.querySelector('svg').style.stroke=''; }
}
function _micStartWebSpeech(SR) {
  recognition=new SR(); recognition.lang='ko-KR';
  recognition.continuous=false; recognition.interimResults=false; recognition.maxAlternatives=1;
  recognition.onresult=(e)=>{
    const t=e.results[0][0].transcript;
    const input=document.getElementById('mob-input');
    if(input&&t) { input.value=t; autoResize(input); updateSendBtn(); }
    _micSetUI(false); setTimeout(mobSend,100);
  };
  recognition.onerror=(e)=>{ _micSetUI(false); if(e.error!=='aborted') toast('🎤 오류: '+e.error); };
  recognition.onend=()=>{ _micSetUI(false); };
  recognition.start(); _micSetUI(true);
}
async function _micStartMediaRecorder() {
  try {
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[]; mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstop=()=>{ stream.getTracks().forEach(t=>t.stop()); _micSetUI(false); toast('🎤 iOS에서는 텍스트로 입력해 주세요.'); };
    mediaRecorder.start(); _micSetUI(true);
  } catch { _micSetUI(false); toast('🎤 마이크 권한이 필요합니다.'); }
}
function toggleMic() {
  if(micActive) {
    if(recognition) { try{recognition.stop();}catch(e){} recognition=null; }
    if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
    _micSetUI(false); return;
  }
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!isIOS&&SR) _micStartWebSpeech(SR);
  else if(isIOS&&window.MediaRecorder) _micStartMediaRecorder();
  else toast('🎤 이 브라우저에서는 음성 인식을 지원하지 않습니다.');
}

function extractAssets() {
  const msgs = _chatHistory.filter(m => m.role === 'user').map(m => m.content).join(' ');
  const kw = ['주식','ETF','채권','리츠','부동산','비트코인','금','원자재',
    '달러','환율','절세','IRP','ISA','연금','배당','공모주','사모펀드','리밸런싱'];
  const found = kw.filter(k => msgs.includes(k));
  return found.length > 0 ? found.slice(0, 5).join('·') : '종합 자산관리';
}
async function sendPDVReport() {
  const cfg = window.KSTOCK_CONFIG || {};
  const mins = Math.round((new Date() - _sessionStart) / 60000);
  const assets = extractAssets();
  try {
    const res = await fetch(cfg.pdvEndpoint || 'https://hondi-proxy.tensor-city.workers.dev/pdv/report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        svc: 'stock', type: 'stock_session_complete',
        who: (typeof _user !== 'undefined' && _user?.ipv6) ? _user.ipv6 : 'anonymous',
        when: new Date().toISOString(),
        where: 'stock.hondi.net',
        what: { session_minutes: mins, message_count: _sessionMsgCnt, assets, chat_length: _chatHistory.length },
        how: { method: 'AI 자산관리 전문가 채팅 (DeepSeek)', device: 'mobile' },
        why: { goal: '개인 맞춤형 자산관리', triggered: _gwpContext ? 'gopang_gwp' : 'direct', gwp_ctx: _gwpContext || null },
      }),
    });
    const ack = await res.json();
    return ack?.pdv_entry || 'recorded';
  } catch(e) {
    console.warn('[PDV]', e.message);
    return null;
  }
}
async function finishAndReturn() {
  const btn = document.querySelector('.cb-btn-primary');
  btn.textContent = '기록 중…'; btn.disabled = true;
  const mins = Math.round((new Date() - _sessionStart) / 60000);
  const pdvId = await sendPDVReport();

  // 보고서 스케줄러 초기화 (school initReportScheduler 패턴 동일)
  // report.js가 로드된 경우 자동 실행
  if (typeof initReportScheduler === 'function') {
    const ipv6 = (typeof _user !== 'undefined' && _user?.ipv6) ? _user.ipv6 : null;
    if (ipv6) initReportScheduler(ipv6);
  }

  // 세션 요약 카드
  const card = document.createElement('div');
  card.className = 'session-card';
  card.innerHTML = `
    <div class="session-card-title">이번 상담 요약</div>
    <div class="sc-row"><span>상담 시간</span><span>${mins}분</span></div>
    <div class="sc-row"><span>대화 횟수</span><span>${_sessionMsgCnt}회</span></div>
    <div class="sc-row"><span>주요 주제</span><span>${extractAssets()}</span></div>
    <div class="sc-row"><span>PDV 기록</span><span>완료 ✓</span></div>
  `;
  document.getElementById('chat-body').appendChild(card);
  appendAI('상담 기록이 고팡 PDV에 저장됐습니다. ✓\n수고하셨습니다! 자산관리 목표를 향해 한 걸음 더 나아갔습니다.');
  hideBanner();

  if (_isGwp && window.opener) {
    try {
      window.opener.postMessage({ type: 'GWP_SESSION_COMPLETE', svc: 'stock', pdv_id: pdvId, minutes: mins, assets: extractAssets() }, _gwpOrigin);
    } catch(e) {}
  }

  setTimeout(() => {
    if (_isGwp && window.opener) {
      window.opener.postMessage({ type: 'GWP_CLOSE', svc: 'stock' }, _gwpOrigin);
    } else {
      window.location.href = 'https://hondi.net';
    }
  }, 1500);
}
function showWelcome(user) {
  const now = new Date();
  const h = now.getHours();
  const greet = h < 12 ? '좋은 아침이에요' : h < 18 ? '안녕하세요' : '좋은 저녁이에요';

  // 날짜 구분선
  const dateEl = document.createElement('div');
  dateEl.className = 'date-div';
  dateEl.textContent = now.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
  document.getElementById('chat-body').appendChild(dateEl);

  let intro = `${greet}! 저는 K-Stock AI 자산관리 전문가입니다.\n\n`;
  if (_gwpContext) {
    intro += `고팡에서 **"${_gwpContext}"** 라고 하셨군요.\n바로 분석 시작할게요!`;
  } else {
    intro += `포트폴리오 점검, 리밸런싱, 절세 전략, 시장 분석 — 무엇이든 물어보세요.`;
  }
  appendAI(intro);
}
function goBack() {
  if (_sessionMsgCnt === 0) {
    if (_isGwp && window.opener) {
      window.opener.postMessage({ type: 'GWP_CLOSE', svc: 'stock' }, _gwpOrigin);
    } else {
      window.location.href = 'https://hondi.net';
    }
    return;
  }
  suggestComplete();
}
function suggestComplete() {
  const mins = Math.round((new Date() - _sessionStart) / 60000);
  document.getElementById('cb-body').textContent =
    `${mins}분 동안 ${_sessionMsgCnt}회 상담 — 고팡 PDV에 자산관리 기록을 전송하시겠습니까?`;
  document.getElementById('complete-banner').classList.add('show');
  scrollBottom();
}

function quickSend(s) { qs(s); }


</script>
<script>
window._onGopangAuth = function(user) {
  if(!user) return;
  const badge=document.getElementById('auth-badge');
  if(badge) { badge.textContent='Lv.'+(user.level||0); badge.style.display='inline-block'; }
  const nameEl=document.getElementById('settings-user-name');
  const levelEl=document.getElementById('settings-user-level');
  if(nameEl) nameEl.textContent=user.name||user.ipv6?.slice(-8)||'인증 완료';
  if(levelEl) levelEl.textContent=`Lv.${user.level||0} · ${user.ipv6?.slice(-12)||''}`;
  try { sessionStorage.setItem('gopang_sso_token',JSON.stringify(user)); } catch(e) {}
  _recordPdv(null);
  console.log('[K-Stock] ✅', user.level, (user.ipv6||'').slice(-8));
};
</script>
